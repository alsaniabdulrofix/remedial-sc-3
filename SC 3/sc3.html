<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartTask Enterprise - Manajemen Tugas Klien</title>
  <style>
    :root {
      --primary: #1e40af;
      --primary-hover: #1d4ed8;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --danger: #b91c1c;
      --danger-hover: #dc2626;
      --success: #15803d;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 3rem 1rem;
      display: flex;
      justify-content: center;
    }
   .app-card {
      width: 100%;
      max-width: 550px;
      background: var(--card-bg);
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border);
    }
    h1 { margin: 0 0 0.5rem 0; font-size: 1.75rem; color: var(--primary); font-weight: 800; }
   .metrics-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px dashed var(--border);
      font-size: 0.875rem;
      color: var(--text-muted);
    }
   .metrics-bar span strong { color: var(--text); }
   .filter-group {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
   .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.2s ease;
    }
   .filter-btn.active {
      background-color: var(--primary);
      color: white;
      border-color: var(--primary);
    }
   .input-form {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
   .input-task {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
   .input-task:focus { border-color: var(--primary); }
   .submit-btn {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.875rem;
      transition: background-color 0.2s;
    }
   .submit-btn:hover { background-color: var(--primary-hover); }
   .task-list-container {
      list-style: none;
      padding: 0;
      margin: 0;
    }
   .task-node {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 0.75rem;
      background: var(--card-bg);
      transition: box-shadow 0.2s;
    }
   .task-node:hover { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); }
   .task-node.completed {
      background-color: #f8fafc;
      border-color: #f1f5f9;
    }
   .task-node.completed label {
      text-decoration: line-through;
      color: var(--text-muted);
    }
   .task-inner {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex: 1;
    }
   .task-inner input[type="checkbox"] {
      width: 1.2rem;
      height: 1.2rem;
      cursor: pointer;
    }
   .task-inner label {
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      user-select: none;
    }
   .destroy-btn {
      background-color: transparent;
      color: var(--danger);
      border: 1px solid transparent;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.813rem;
      transition: all 0.2s;
    }
   .destroy-btn:hover {
      background-color: #fef2f2;
      border-color: #fee2e2;
    }
  </style>
</head>
<body>

  <div class="app-card">
    <h1>SmartTask</h1>
    
    <div class="metrics-bar">
      <span>Total: <strong id="metricTotal">0</strong></span>
      <span>Aktif: <strong id="metricActive">0</strong></span>
      <span>Selesai: <strong id="metricCompleted">0</strong></span>
    </div>

    <div class="filter-group" id="filterContainer">
      <button class="filter-btn active" data-filter="all">Semua</button>
      <button class="filter-btn" data-filter="active">Aktif</button>
      <button class="filter-btn" data-filter="completed">Selesai</button>
    </div>

    <form class="input-form" id="smartTaskForm">
      <input type="text" id="taskInputField" class="input-task" placeholder="Tulis rencana kerja baru..." required autocomplete="off" />
      <button type="submit" class="submit-btn">Tambah</button>
    </form>
    
    <ul class="task-list-container" id="taskContainer">
      </ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
